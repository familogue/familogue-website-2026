backend:
  name: github
  repo: familogue/familogue-website-2026
  branch: main
  base_url: https://www.familogue.ca
  auth_endpoint: /api/auth

media_folder: public/images
public_folder: /images

collections:
  - name: services
    label: Services
    files:
      - name: services
        label: Services
        file: content/services.json
        fields:
          - name: services
            label: Services
            widget: list
            summary: '{{title_en}}'
            fields:
              - { name: slug, label: Slug, widget: string }
              - { name: title, label: Title (ZH), widget: string }
              - { name: title_en, label: Title (EN), widget: string }
              - name: content
                label: Content (ZH)
                widget: markdown
                editor_components: []
              - name: content_en
                label: Content (EN)
                widget: markdown
                editor_components: []
              - name: image
                label: Image
                widget: file
                media_folder: /public/images
                public_folder: /images
                required: false
              - name: status
                label: Status
                widget: select
                options:
                  - Published
                  - Archived
  - name: media
    label: Media
    files:
      - name: media
        label: Media
        file: content/media.json
        fields:
          - name: media
            label: Media Items
            widget: list
            summary: '{{outlet}} — {{headline}}'
            fields:
              - { name: outlet, label: Outlet, widget: string }
              - { name: headline, label: Headline, widget: string }
              - {
                  name: date,
                  label: Date,
                  widget: datetime,
                  format: YYYY-MM-DD,
                  date_format: YYYY-MM-DD,
                  time_format: false,
                }
              - { name: url, label: URL, widget: string }
              - name: thumbnail
                label: Thumbnail
                widget: file
                media_folder: /public/images
                public_folder: /images
                required: false
              - name: status
                label: Status
                widget: select
                options:
                  - Published
                  - Archived
